name: File Count Automation CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  count-sketches:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Workspace Assets
      uses: actions/checkout@v4

    - name: Initialize Python Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run File Scanner Script
      run: |
        python -c "
        import os
        from pathlib import Path
        
        # Scan the workspace recursively for Arduino sketch files
        ino_files = list(Path('.').rglob('*.ino'))
        count = len(ino_files)
        
        print('='*50)
        print(f'📊 CI/CD AUTOMATION REPORT: FOUND {count} ARDUINO SKETCHES')
        print('='*50)
        for index, file_path in enumerate(ino_files, start=1):
            print(f' [{index}] -> {file_path}')
        print('='*50)
        "
